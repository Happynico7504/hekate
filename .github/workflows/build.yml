name: Build CI

on:
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest
    container: devkitpro/devkitarm

    steps:
    - uses: actions/checkout@v4
    
    - run: |
           make
           tar -c output | gzip -9 > hekate.tar.gz

    - name: Upload Binary
      uses: actions/upload-artifact@v4
      with:
        name: package
        path: |
              hekate.tar.gz
